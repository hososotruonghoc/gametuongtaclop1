.gv-banner{background:linear-gradient(135deg,#fce7f3,#fdf2f8);border:2px solid #f9a8d4;border-radius:16px;padding:12px 20px;margin-bottom:16px;font-size:1em;color:#9d174d;text-align:center;width:100%;max-width:700px}
.gv-banner strong{color:#dc2626}
.setup-card{background:white;border-radius:24px;padding:30px;width:100%;max-width:550px;box-shadow:0 8px 32px rgba(0,0,0,.08);border:2px solid #fbcfe8}
.setup-card label{display:block;font-weight:700;font-size:1.1em;margin:14px 0 6px;color:#db2777}
.setup-card select,.setup-card input{width:100%;padding:14px 18px;border-radius:14px;border:2px solid #cbd5e1;background:#f8fafc;font-size:1.1em;font-family:&amp;#x27;Quicksand&amp;#x27;,sans-serif;font-weight:600;outline:none;transition:.3s;color:#334155}
.setup-card select:focus,.setup-card input:focus{border-color:#ec4899;box-shadow:0 0 0 3px rgba(236,72,153,.15)}
.team-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border:none;border-radius:14px;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.2em;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}
.btn-start{background:linear-gradient(135deg,#ec4899,#db2777);color:white;width:100%;margin-top:18px}
.btn-answer{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;padding:14px 28px}
.btn-next{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
.btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.hidden{display:none!important}
.game-area{width:100%;max-width:800px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.score-board{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.team-score{padding:8px 16px;border-radius:12px;font-weight:800;font-size:.95em;background:white;border:2px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.team-score.active{border-color:#ec4899;background:#fdf2f8;box-shadow:0 3px 12px rgba(236,72,153,.15)}
.round-info{background:white;padding:8px 18px;border-radius:12px;font-weight:800;color:#db2777;border:2px solid #fbcfe8;font-size:1em}
.timer-ring{display:flex;justify-content:center;margin:14px 0;position:relative}
.timer-ring svg{width:140px;height:140px}
.timer-bg{fill:none;stroke:#f1f5f9;stroke-width:10}
.timer-progress{fill:none;stroke:#ec4899;stroke-width:10;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear}
.timer-progress.warning{stroke:#f59e0b}
.timer-progress.danger{stroke:#ef4444;animation:pulse .5s infinite}
@keyframes pulse{50%{opacity:.6}}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:2.8em;font-weight:800;color:#db2777}
.question-card{background:white;border:3px solid #fbcfe8;border-radius:24px;padding:28px;text-align:center;transition:.3s;box-shadow:0 6px 24px rgba(0,0,0,.06)}
.question-card.correct-flash{border-color:#22c55e;box-shadow:0 0 30px rgba(34,197,94,.2);background:#f0fdf4}
.question-card.wrong-flash{border-color:#ef4444;box-shadow:0 0 30px rgba(239,68,68,.15);background:#fef2f2}
.question-expression{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:clamp(2.5em,8vw,4.5em);margin:12px 0;color:#1e293b;line-height:1.2}
.answer-area{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin:12px 0}
.answer-input{width:140px;padding:14px 18px;border:3px solid #e2e8f0;border-radius:16px;font-size:2em;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-weight:800;text-align:center;outline:none;transition:.3s;background:#f8fafc;color:#1e293b}
.answer-input:focus{border-color:#ec4899;box-shadow:0 0 0 4px rgba(236,72,153,.12)}
.answer-input.correct{border-color:#22c55e;background:#dcfce7}
.answer-input.wrong{border-color:#ef4444;background:#fee2e2}
.feedback{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.6em;margin:10px 0;min-height:36px}
.feedback.correct{color:#16a34a}.feedback.wrong{color:#dc2626}
.controls{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:10px}
.result-card{background:white;border-radius:24px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,.06);text-align:center;width:100%;max-width:550px;border:3px solid #fbcfe8}
.trophy{font-size:4em;margin-bottom:6px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.result-title{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:2em;color:#db2777}
.winner-name{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.4em;color:#1e293b;margin:8px 0}
.result-table{width:100%;border-collapse:collapse;margin:14px 0;font-weight:700}
.result-table th{background:#fce7f3;padding:10px;color:#9d174d;font-size:.9em}
.result-table td{padding:10px;border-bottom:1px solid #f1f5f9;font-size:1em}
.confetti-piece{position:fixed;top:-20px;z-index:10000;animation:confetti-fall var(--fall-duration) ease-out forwards}
@keyframes confetti-fall{to{top:110vh;transform:rotate(var(--rotation))}}
@media(max-width:600px){h1{font-size:2em}.question-expression{font-size:2.5em}.answer-input{width:100px;font-size:1.5em}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 30px;border:none;border-radius:14px;font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.15em;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}
.btn-start{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;width:100%;margin-top:16px}
.btn-next{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
.btn-restart{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.hidden{display:none!important}
.game-area{width:100%;max-width:750px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.round-info{background:white;padding:8px 18px;border-radius:12px;font-weight:800;color:#d97706;border:2px solid #fbbf24}
.score-info{background:white;padding:8px 18px;border-radius:12px;font-weight:800;color:#16a34a;border:2px solid #bbf7d0}
.q-card{background:white;border:2px solid #e2e8f0;border-radius:20px;padding:24px;text-align:center;margin-bottom:12px;transition:.4s;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.q-card.flash-correct{border-color:#22c55e;background:#f0fdf4}
.q-card.flash-wrong{border-color:#ef4444;background:#fef2f2}
.q-topic{color:#d97706;font-size:.85em;font-weight:700;margin-bottom:4px}
.q-text{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:clamp(1.3em,3.5vw,2.2em);margin:8px 0 16px;line-height:1.3;color:#1e293b}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
.option-btn{padding:14px 18px;border-radius:14px;border:3px solid #e2e8f0;background:#f8fafc;color:#1e293b;font-size:clamp(1em,2vw,1.3em);font-weight:700;cursor:pointer;transition:.3s;text-align:center}
.option-btn:hover{border-color:#f59e0b;background:#fffbeb;transform:scale(1.02)}
.option-btn.correct{border-color:#22c55e;background:#dcfce7;color:#166534}
.option-btn.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b}
.feedback{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.4em;margin:10px 0;min-height:30px}
.feedback.correct{color:#16a34a}.feedback.wrong{color:#dc2626}
.controls{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.result-card{background:white;border-radius:24px;padding:30px;box-shadow:0 6px 24px rgba(0,0,0,.06);text-align:center;width:100%;max-width:500px;border:2px solid #fbbf24}
.trophy{font-size:3.5em;margin-bottom:6px}
.result-title{font-family:&amp;#x27;Baloo 2&amp;#x27;,cursive;font-size:1.8em;color:#d97706}
.result-score{font-size:1.3em;font-weight:800;margin:10px 0}
.confetti-piece{position:fixed;top:-20px;z-index:10000;animation:confetti-fall var(--fall-duration) ease-out forwards}
@keyframes confetti-fall{to{top:110vh;transform:rotate(var(--rotation))}}
@media(max-width:600px){.options-grid{grid-template-columns:1fr}}

function startGame(){
  const subj=document.getElementById(&amp;#x27;subjectSelect&amp;#x27;).value;

  const bank=subj===&amp;#x27;math&amp;#x27;?MATH:TV;
  let pool;
  if(level===&amp;#x27;all&amp;#x27;){pool=shuffle([...bank]).slice(0,25)}
  else{pool=shuffle(bank.filter(q=&amp;gt;q.d===level))}

  const q=st.questions[st.qIdx];const btns=document.querySelectorAll(&amp;#x27;.option-btn&amp;#x27;);

  btns.forEach(b=&amp;gt;b.classList.add(&amp;#x27;disabled&amp;#x27;));btns[q.a].classList.add(&amp;#x27;correct&amp;#x27;);
  const pts=q.d===&amp;#x27;easy&amp;#x27;?5:q.d===&amp;#x27;medium&amp;#x27;?10:q.d===&amp;#x27;hard&amp;#x27;?15:20;
